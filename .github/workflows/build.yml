name: Build and Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-check:
    name: Build and Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements.txt

      - name: TypeScript build
        run: npm run build

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Python syntax check
        run: python -m py_compile .\video_engine_v5.py

      - name: Python CLI smoke check
        run: python .\video_engine_v5.py --help

      - name: Python V5 scan plan compile smoke test
        run: python .\tests\smoke_v5_4.py

      - name: Python V5.6 long-video stability smoke test
        run: python .\tests\smoke_v5_6_long_video_stability.py
